[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "ruff-check", name = "ruff check", language = "system", entry = "pdm run ruff check", types = ["python"] },
    { id = "ruff-format", name = "ruff format", language = "system", entry = "pdm run ruff format --check", types = ["python"] },
]
