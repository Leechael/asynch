name: ci

on:
  push:
    branches:
      - clickhouse-driver-compact
  pull_request:
    branches:
      - clickhouse-driver-compact
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Lint
        run: make check

  compat:
    name: Python ${{ matrix.python }} / CH ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: latest
            python: "3.9"
            clickhouse: clickhouse/clickhouse-server:latest
            min_server_revision: "54483"
            required_types: JSON,Variant,Dynamic,QBit,BFloat16,Time
          - name: latest
            python: "3.13"
            clickhouse: clickhouse/clickhouse-server:latest
            min_server_revision: "54483"
            required_types: JSON,Variant,Dynamic,QBit,BFloat16,Time
          - name: latest
            python: "3.14"
            clickhouse: clickhouse/clickhouse-server:latest
            min_server_revision: "54483"
            required_types: JSON,Variant,Dynamic,QBit,BFloat16,Time
          - name: 24.3-lts
            python: "3.13"
            clickhouse: clickhouse/clickhouse-server:24.3
            server_revision: "54467"
          - name: 25.3-lts
            python: "3.13"
            clickhouse: clickhouse/clickhouse-server:25.3
            server_revision: "54476"
          - name: latest-client-54468
            python: "3.13"
            clickhouse: clickhouse/clickhouse-server:latest
            min_server_revision: "54483"
            client_revision: "54468"
            dsn: clickhouse://default:@127.0.0.1:9000/default?client_revision=54468
            required_types: JSON,Variant,Dynamic,QBit,BFloat16,Time
          - name: latest-client-54476
            python: "3.13"
            clickhouse: clickhouse/clickhouse-server:latest
            min_server_revision: "54483"
            client_revision: "54476"
            dsn: clickhouse://default:@127.0.0.1:9000/default?client_revision=54476
            required_types: JSON,Variant,Dynamic,QBit,BFloat16,Time
    services:
      clickhouse:
        image: ${{ matrix.clickhouse }}
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASYNCH_CLIENT_REVISION: ${{ matrix.client_revision }}
      ASYNCH_EXPECT_SERVER_REVISION: ${{ matrix.server_revision }}
      ASYNCH_MIN_SERVER_REVISION: ${{ matrix.min_server_revision }}
      ASYNCH_REQUIRED_TYPE_FAMILIES: ${{ matrix.required_types }}
      CLICKHOUSE_DSN: ${{ matrix.dsn }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Test compatibility cell
        run: PYTHONDEVMODE=1 PYTHONTRACEMALLOC=1 pytest

  sqlalchemy:
    name: SQLAlchemy downstream / CH latest
    runs-on: ubuntu-latest
    env:
      CLICKHOUSE_SQLALCHEMY_REF: 61775263540aecba7edad701abc299f7812aaab1
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install asynch HEAD and downstream test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[compression]"
          git init /tmp/clickhouse-sqlalchemy
          git -C /tmp/clickhouse-sqlalchemy fetch --depth 1 \
            https://github.com/Leechael/clickhouse-sqlalchemy.git "$CLICKHOUSE_SQLALCHEMY_REF"
          git -C /tmp/clickhouse-sqlalchemy checkout FETCH_HEAD
          sed -i 's/except DeprecationWarning:/except (DeprecationWarning, RuntimeError):/' \
            /tmp/clickhouse-sqlalchemy/tests/util.py
          grep -Fq 'except (DeprecationWarning, RuntimeError):' \
            /tmp/clickhouse-sqlalchemy/tests/util.py
          python -m pip install --no-deps /tmp/clickhouse-sqlalchemy
          python -m pip install "SQLAlchemy>=2.0,<2.1" requests clickhouse-driver \
            pytest pytest-asyncio pytest-timeout greenlet alembic responses parameterized
      - name: Test downstream asynch dialect
        working-directory: /tmp/clickhouse-sqlalchemy
        run: |
          pytest -rs -v --timeout=20 tests/drivers/asynch \
            --ignore=tests/drivers/asynch/test_cursor.py \
            --ignore=tests/drivers/asynch/test_insert.py \
            --ignore=tests/drivers/asynch/test_select.py
          pytest -rs -v --timeout=20 tests/drivers/test_asynch_soft_close.py
          pytest -rs -v --timeout=20 tests/drivers/asynch/test_cursor.py
          pytest -rs -v --timeout=20 tests/drivers/asynch/test_insert.py
          pytest -rs -v --timeout=20 tests/drivers/asynch/test_select.py
