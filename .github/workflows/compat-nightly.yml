name: compat-nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      wp01_benchmark:
        description: Run only the manual WP01/WP07 benchmark job
        required: false
        default: false
        type: boolean
      wp07_benchmark:
        description: Run only the manual WP07 pure-Python C control
        required: false
        default: false
        type: boolean
      pool_only:
        description: Run only the B/D pool benchmark matrices
        required: false
        default: false
        type: boolean
      wp01_rows:
        description: Rows in each deterministic A workload
        required: false
        default: "1000000"
        type: string
      pool_only:
        description: Run only the B/D pool benchmark matrices
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  old-servers:
    if: ${{ inputs.wp01_benchmark != true && inputs.wp07_benchmark != true && inputs.pool_only != true }}
    name: Python 3.13 / CH ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 22.6-stable-old-downgrade
            clickhouse: clickhouse/clickhouse-server:22.6
            server_revision: "54455"
          - name: 22.8-lts-parameters-boundary
            clickhouse: clickhouse/clickhouse-server:22.8
            server_revision: "54460"
          - name: 24.8-lts
            clickhouse: clickhouse/clickhouse-server:24.8
            server_revision: "54469"
    services:
      clickhouse:
        image: ${{ matrix.clickhouse }}
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASYNCH_EXPECT_SERVER_REVISION: ${{ matrix.server_revision }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Test old-server compatibility
        run: PYTHONDEVMODE=1 PYTHONTRACEMALLOC=1 pytest

  python-versions:
    if: ${{ inputs.wp01_benchmark != true && inputs.wp07_benchmark != true && inputs.pool_only != true }}
    name: Python ${{ matrix.python }} / CH latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ASYNCH_MIN_SERVER_REVISION: "54483"
      ASYNCH_REQUIRED_TYPE_FAMILIES: JSON,Variant,Dynamic,QBit,BFloat16,Time
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Test Python compatibility
        run: PYTHONDEVMODE=1 PYTHONTRACEMALLOC=1 pytest

  zstd-suite:
    if: ${{ inputs.wp01_benchmark != true && inputs.wp07_benchmark != true && inputs.pool_only != true }}
    name: Full suite over zstd
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      CLICKHOUSE_DSN: clickhouse://default:@127.0.0.1:9000/default?compression=zstd
      ASYNCH_MIN_SERVER_REVISION: "54483"
      ASYNCH_REQUIRED_TYPE_FAMILIES: JSON,Variant,Dynamic,QBit,BFloat16,Time
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Test full suite with zstd DSN
        run: PYTHONDEVMODE=1 PYTHONTRACEMALLOC=1 pytest

  without-cityhash:
    if: ${{ inputs.wp01_benchmark != true && inputs.wp07_benchmark != true && inputs.pool_only != true }}
    name: Compression dependency absent
    runs-on: ubuntu-latest
    env:
      ASYNCH_EXPECT_CITYHASH: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install without compression extra
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          poetry install --no-root --with test --without dev,lint
      - name: Verify the missing dependency behavior
        run: pytest tests/test_proto/test_failure_compat.py::test_cityhash_dependency_contract

  tls:
    if: ${{ inputs.wp01_benchmark != true && inputs.wp07_benchmark != true && inputs.pool_only != true }}
    name: TLS handshake and compression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          make deps
      - name: Start TLS-enabled ClickHouse
        run: bash tests/ci/start-clickhouse-tls.sh
      - name: Test a verified TLS handshake with compression
        run: pytest tests/test_compat_matrix.py::test_real_tls_handshake

  wp01-benchmarks:
    if: ${{ inputs.wp01_benchmark == true || inputs.wp07_benchmark == true || inputs.pool_only == true }}
    name: Manual WP01 D/A/B/C and WP07 pure-Python measurement
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[compression]" clickhouse-driver
          mkdir -p benchmarks/results/workflow
      - name: Run pool-level concurrency matrix
        if: ${{ inputs.wp01_benchmark == true || inputs.pool_only == true }}
        env:
          CLICKHOUSE_DSN: clickhouse://default:@127.0.0.1:9000/default
        run: |
          mkdir -p benchmarks/results/workflow
          for rtt in 0 1 5 20; do
            if [ "$rtt" = 0 ]; then
              python -m benchmarks.bench_concurrency \
                --rtt-ms 0 --workers 1,8,32,128 --iterations 5 --rounds 5 \
                --seed 20260712 --json \
                > benchmarks/results/workflow/concurrency-rtt-0ms.json
              continue
            fi
            delay_ms=$(python -c "print(${rtt} / 2)")
            python -m benchmarks._proxy --listen 19000 --target 127.0.0.1:9000 \
              --delay-ms "$delay_ms" &
            proxy_pid=$!
            trap 'kill "$proxy_pid" 2>/dev/null || true' EXIT
            sleep 1
            CLICKHOUSE_DSN='clickhouse://default:@127.0.0.1:19000/default' \
              python -m benchmarks.bench_concurrency \
                --rtt-ms "$rtt" --workers 1,8,32,128 --iterations 5 --rounds 5 \
                --seed 20260712 --json \
                > "benchmarks/results/workflow/concurrency-rtt-${rtt}ms.json"
            kill "$proxy_pid"
            wait "$proxy_pid" || true
            trap - EXIT
          done
      - name: Run pool-contention matrix
        if: ${{ inputs.wp01_benchmark == true || inputs.pool_only == true }}
        env:
          CLICKHOUSE_DSN: clickhouse://default:@127.0.0.1:9000/default
        run: |
          python -m benchmarks.bench_pool_contention --rtt-ms 0 --json \
            > benchmarks/results/workflow/pool-rtt-0ms.json

          for rtt in 1 5 20; do
            delay_ms=$(python -c "print(${rtt} / 2)")
            python -m benchmarks._proxy --listen 19000 --target 127.0.0.1:9000 \
              --delay-ms "$delay_ms" &
            proxy_pid=$!
            trap 'kill "$proxy_pid" 2>/dev/null || true' EXIT
            sleep 1
            CLICKHOUSE_DSN='clickhouse://default:@127.0.0.1:19000/default' \
              python -m benchmarks.bench_pool_contention --rtt-ms "$rtt" --json \
              > "benchmarks/results/workflow/pool-rtt-${rtt}ms.json"
            kill "$proxy_pid"
            wait "$proxy_pid" || true
            trap - EXIT
          done
      - name: Run event-loop-lag matrix
        if: ${{ inputs.wp01_benchmark == true }}
        env:
          CLICKHOUSE_DSN: clickhouse://default:@127.0.0.1:9000/default
          WP01_ROWS: ${{ inputs.wp01_rows }}
        run: |
          python -m benchmarks.bench_loop_lag --rows "$WP01_ROWS" --json \
            > benchmarks/results/workflow/loop-lag.json
      - name: Build no-Cython source clickhouse-driver
        if: ${{ inputs.wp01_benchmark == true || inputs.wp07_benchmark == true }}
        run: |
          git clone https://github.com/mymarilyn/clickhouse-driver.git /tmp/clickhouse-driver
          git -C /tmp/clickhouse-driver checkout 49afa09
          python -m venv /tmp/wp01-clickhouse-driver-source
          /tmp/wp01-clickhouse-driver-source/bin/python -m pip install --upgrade pip
          /tmp/wp01-clickhouse-driver-source/bin/python -m pip install '/tmp/clickhouse-driver[lz4]'
          /tmp/wp01-clickhouse-driver-source/bin/python - <<'PY'
          import importlib.util

          assert importlib.util.find_spec("Cython") is None
          PY
      - name: Build pure-Python clickhouse-driver control
        if: ${{ inputs.wp01_benchmark == true || inputs.wp07_benchmark == true }}
        run: |
          python benchmarks/pure_python_driver/build_env.py \
            --output-dir /tmp/wp07-clickhouse-driver-pure-python \
            > benchmarks/results/workflow/pure-python-build.json
      - name: Run four-way single-query throughput matrix
        if: ${{ inputs.wp01_benchmark == true || inputs.wp07_benchmark == true }}
        env:
          CLICKHOUSE_DSN: clickhouse://default:@127.0.0.1:9000/default
          WP01_ROWS: ${{ inputs.wp01_rows }}
        run: |
          python -m benchmarks.bench_throughput \
            --rows "$WP01_ROWS" \
            --source-driver-python /tmp/wp01-clickhouse-driver-source/bin/python \
            --source-driver-revision 49afa09 \
            --pure-python-python /tmp/wp07-clickhouse-driver-pure-python/venv/bin/python \
            --text-output benchmarks/results/workflow/throughput-pure-python.txt \
            --json > benchmarks/results/workflow/throughput-pure-python.json
      - name: Upload raw measurement reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: wp01-benchmark-results-${{ github.run_id }}
          path: benchmarks/results/workflow/
          retention-days: 14
